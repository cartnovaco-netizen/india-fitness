<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India Fitness | Admin</title>
    <script>
      // Crucial: Tell Decap NOT to auto-run
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Scripts at the bottom for reliability -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
      window.onload = async function() {
        if (!window.CMS) {
          document.body.innerHTML = '<h2 style="color:red;text-align:center;margin-top:50px;">Admin Panel failed to load. Clear your cache and refresh.</h2>';
          return;
        }

        try {
          const res = await fetch('/admin/config.yml');
          const yamlText = await res.text();
          const config = jsyaml.load(yamlText);

          // Force absolute API URL
          if (config.backend) {
            config.backend.base_url = window.location.origin + '/api';
            config.backend.name = 'github';
            config.backend.repo = 'cartnovaco-netizen/INDIA-FITNESS';
          }

          // Initialize
          window.CMS.init({ config });
          
          // Debugging helper
          console.log("CMS Initialized. Checking auth memory...");
          const stored = localStorage.getItem('decap-cms-user') || localStorage.getItem('netlify-cms-user');
          if (stored) {
             console.log("Active Session Detected.");
          } else {
             console.log("No active session found.");
          }
        } catch (e) {
          console.error("Init Error:", e);
          document.body.innerHTML = '<h2 style="color:red;text-align:center;margin-top:50px;">Config Error: ' + e.message + '</h2>';
        }
      };
    </script>
  </body>
</html>

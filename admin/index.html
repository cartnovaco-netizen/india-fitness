<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India Fitness | Admin</title>
    <script>
      // Crucial: Tell Decap NOT to auto-run
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Scripts at the bottom for reliability -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
      (function() {
        window.CMS_MANUAL_INIT = true;

        async function init() {
          if (!window.CMS || !window.jsyaml) {
            console.log("Waiting for libraries...");
            setTimeout(init, 100);
            return;
          }

          try {
            const res = await fetch('/admin/config.yml');
            const yamlText = await res.text();
            const config = jsyaml.load(yamlText);

            if (config.backend) {
              config.backend.base_url = window.location.origin + '/api';
              config.backend.name = 'github';
              config.backend.repo = 'cartnovaco-netizen/INDIA-FITNESS';
            }

            // Debugging helper
            const debugLog = (msg) => {
              console.log("[CMS DEBUG]", msg);
              const logEl = document.getElementById("cms-debug-log");
              if (logEl) logEl.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            };

            // Catch the message from the popup
            window.addEventListener('message', (e) => {
              debugLog("Received message: " + JSON.stringify(e.data).substring(0, 50));
              
              // If we see the success string, and it didn't trigger, force a refresh
              const data = e.data;
              if (data === "authorization:github:success" || (typeof data === "string" && data.indexOf("success") !== -1)) {
                 debugLog("Auth Success detected! Refreshing in 1s...");
                 setTimeout(() => window.location.reload(), 1000);
              }
            }, false);

            // Start CMS
            window.CMS.init({ config });
            debugLog("CMS Initialized.");
          } catch (e) {
            console.error("CMS Init Error:", e);
          }
        }

        init();
      })();
    </script>
    <div id="cms-debug-log" style="position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.8);color:white;padding:10px;font-size:10px;max-width:300px;max-height:200px;overflow:auto;pointer-events:none;z-index:9999;">
      DEBUG LOG:
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Fitness | Custom CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #cf0000;
            --bg: #0a0a0a;
            --card: #151515;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --save: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        aside { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 900; font-size: 20px; color: var(--primary); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        nav { flex: 1; }
        nav button { 
            width: 100%; padding: 12px 15px; background: none; border: none; color: var(--text-dim); text-align: left; 
            font-size: 14px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        nav button i { width: 18px; }
        nav button.active { background: var(--primary); color: white; }
        nav button:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        .auth-status { padding: 15px; background: #111; border-radius: 8px; font-size: 12px; color: var(--text-dim); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; }
        
        .save-bar { 
            position: sticky; top: -40px; background: rgba(21,21,21,0.9); backdrop-filter: blur(10px);
            padding: 15px 0; display: flex; gap: 15px; border-bottom: 1px solid #333; z-index: 100;
        }
        .btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: var(--save); color: #000; font-size: 14px; }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Form Stuff */
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 20px; position: relative; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { 
            width: 100%; background: #222; border: 1px solid #333; padding: 12px; color: white; border-radius: 6px; 
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        .list-item { padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; border: 1px dashed #444; }
        
        .badge { font-size: 10px; background: var(--primary); padding: 2px 6px; border-radius: 4px; }
        .remove-btn { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 12px; }

        /* Login Overlay */
        #login-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; 
            align-items: center; justify-content: center; flex-direction: column;
        }
        .login-card { width: 350px; text-align: center; }

        /* Toast */
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: var(--save); color: #000; border-radius: 8px; transform: translateY(100px); transition: 0.5s; z-index: 10000; }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="logo">India Fitness CRM</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Login with GitHub to start managing your gym.</p>
            <button class="btn btn-primary" onclick="login()">
                <i class="fab fa-github"></i> Login with GitHub
            </button>
        </div>
    </div>

    <aside>
        <div class="logo">India Fitness</div>
        <nav>
            <button class="active" onclick="showSection('trainers')"><i class="fas fa-users"></i> Trainers</button>
            <button onclick="showSection('gallery')"><i class="fas fa-images"></i> Gallery</button>
            <button onclick="showSection('plans')"><i class="fas fa-tags"></i> Pricing Plans</button>
        </nav>
        <div class="auth-status" id="auth-status">
            Not Authenticated
        </div>
    </aside>

    <main>
        <div class="header">
            <h1 id="section-title">Manage Trainers</h1>
            <button class="btn btn-save" onclick="saveData()" id="save-btn">
                <i class="fas fa-cloud-upload-alt"></i> Publish Changes
            </button>
        </div>

        <div id="content-area">
            <!-- Content Injected Here -->
        </div>

        <div style="margin-top: 20px;">
            <button class="btn" style="background: #222; width: 100%; border: 1px dashed #444;" onclick="addNewItem()">
                <i class="fas fa-plus"></i> Add New Item
            </button>
        </div>
    </main>

    <div id="toast">Changes saved to GitHub!</div>

    <script>
        let currentSection = 'trainers';
        let data = {
            trainers: [],
            gallery: [],
            plans: []
        };
        let token = localStorage.getItem('india-fitness-token');

        // Check login
        if (token) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('auth-status').innerText = 'Logged in as Admin';
            loadAllData();
        }

        async function login() {
            const popup = window.open('/api/auth', 'GitHub Auth', 'width=600,height=700');
            
            window.addEventListener('message', (event) => {
                if (event.data?.source === 'netlify-cms-auth' || event.data?.indexOf?.('success') !== -1) {
                    let payload = event.data.payload || JSON.parse(event.data.split(':')[3]);
                    token = payload.token;
                    localStorage.setItem('india-fitness-token', token);
                    document.location.reload();
                }
            });
        }

        async function loadAllData() {
            try {
                // Fetch direct from GitHub API to ensure fresh data
                const headers = { 'Authorization': `token ${token}` };
                const base = 'https://api.github.com/repos/cartnovaco-netizen/INDIA-FITNESS/contents/_data';
                
                const [tRes, gRes, pRes] = await Promise.all([
                    fetch(`${base}/trainers.json`, { headers }),
                    fetch(`${base}/gallery.json`, { headers }),
                    fetch(`${base}/plans.json`, { headers })
                ]);

                const [tData, gData, pData] = await Promise.all([tRes.json(), gRes.json(), pRes.json()]);

                // Decode base64
                data.trainers = JSON.parse(atob(tData.content)).trainers;
                data.gallery = JSON.parse(atob(gData.content)).items;
                data.plans = JSON.parse(atob(pData.content)).plans;

                render();
            } catch (e) {
                console.error("Load Failed", e);
                alert("Failed to load data from GitHub. Check your connection.");
            }
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('section-title').innerText = 'Manage ' + section.charAt(0).toUpperCase() + section.slice(1);
            render();
        }

        function render() {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            
            const list = sectionToList();
            list.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let fieldsHtml = ``;
                if (currentSection === 'trainers') {
                    const specs = item.specializations || [];
                    fieldsHtml = `
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <div class="field"><label>Name</label><input value="${item.name}" onchange="updateItem(${idx}, 'name', this.value)"></div>
                                <div class="field"><label>Role</label><input value="${item.role}" onchange="updateItem(${idx}, 'role', this.value)"></div>
                                <div class="field"><label>Experience</label><input value="${item.exp}" onchange="updateItem(${idx}, 'exp', this.value)"></div>
                                <div class="field">
                                    <label>Profile Image</label>
                                    <div style="display: flex; gap: 10px;">
                                        <input value="${item.image}" id="img-path-${idx}" onchange="updateItem(${idx}, 'image', this.value); render();" style="flex: 1;">
                                        <button class="btn" style="background: #333; font-size: 11px;" onclick="document.getElementById('file-input-${idx}').click()">Upload New</button>
                                        <input type="file" id="file-input-${idx}" style="display:none" onchange="uploadMedia(this.files[0], ${idx})">
                                    </div>
                                </div>
                            </div>
                            <div style="width: 150px;">
                                <label>Preview</label>
                                <img src="/${item.image}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #333;" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                            </div>
                        </div>
                        <div class="field"><label>Bio</label><textarea style="height: 80px;" onchange="updateItem(${idx}, 'bio', this.value)">${item.bio}</textarea></div>
                        <div class="field">
                            <label>Specializations</label>
                            <div id="specs-${idx}" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
                                ${specs.map((s, sIdx) => `
                                    <div class="badge" style="display: flex; align-items: center; gap: 5px;">
                                        ${s} <i class="fas fa-times" style="cursor:pointer;" onclick="removeSubItem(${idx}, 'specializations', ${sIdx})"></i>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input id="new-spec-${idx}" placeholder="Add new spec..." style="padding: 8px; font-size: 12px; flex: 1;">
                                <button class="btn btn-primary" style="padding: 5px 15px;" onclick="addSubItem(${idx}, 'specializations', document.getElementById('new-spec-${idx}').value)">Add</button>
                            </div>
                        </div>
                    `;
                } else if (currentSection === 'gallery') {
                    fieldsHtml = `
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <div class="field"><label>Caption</label><input value="${item.caption}" onchange="updateItem(${idx}, 'caption', this.value)"></div>
                                <div class="field">
                                    <label>Gallery Image</label>
                                    <div style="display: flex; gap: 10px;">
                                        <input value="${item.image}" id="img-path-${idx}" onchange="updateItem(${idx}, 'image', this.value); render();" style="flex: 1;">
                                        <button class="btn" style="background: #333; font-size: 11px;" onclick="document.getElementById('file-input-${idx}').click()">Upload Photo</button>
                                        <input type="file" id="file-input-${idx}" style="display:none" onchange="uploadMedia(this.files[0], ${idx})">
                                    </div>
                                </div>
                            </div>
                            <div style="width: 200px;">
                                <img src="/${item.image}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border:1px solid #333;" onerror="this.src='https://via.placeholder.com/200?text=No+Photo'">
                            </div>
                        </div>
                    `;
                } else if (currentSection === 'plans') {
                    const features = item.features || [];
                    fieldsHtml = `
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="field"><label>Plan Title</label><input value="${item.title}" onchange="updateItem(${idx}, 'title', this.value)"></div>
                            <div class="field"><label>Price (e.g. ₹1100)</label><input value="${item.price}" onchange="updateItem(${idx}, 'price', this.value)"></div>
                            <div class="field"><label>Monthly tag (e.g. / month)</label><input value="${item.duration}" onchange="updateItem(${idx}, 'duration', this.value)"></div>
                            <div class="field"><label>Bonus Text (Optional)</label><input value="${item.bonus}" onchange="updateItem(${idx}, 'bonus', this.value)"></div>
                        </div>
                        <div class="field">
                            <label>Plan Features</label>
                            <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;">
                                ${features.map((f, fIdx) => `
                                    <div class="badge" style="background: #333; padding: 5px 10px; display: flex; align-items: center; gap: 8px;">
                                        ${f} <i class="fas fa-trash" style="font-size: 10px; color: #ff4444; cursor:pointer;" onclick="removeSubItem(${idx}, 'features', ${fIdx})"></i>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input id="new-feat-${idx}" placeholder="New feature..." style="flex:1;">
                                <button class="btn btn-save" style="padding: 10px; background: #444; color: white;" onclick="addSubItem(${idx}, 'features', document.getElementById('new-feat-${idx}').value)">Add Feature</button>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span style="font-weight: bold; color: var(--primary)">${currentSection.toUpperCase()} #${idx + 1}</span>
                        <button class="remove-btn" onclick="removeItem(${idx})"><i class="fas fa-trash-alt"></i> Delete Item</button>
                    </div>
                    ${fieldsHtml}
                `;
                area.appendChild(card);
            });
        }

        function sectionToList() {
            if (currentSection === 'trainers') return data.trainers;
            if (currentSection === 'gallery') return data.gallery;
            return data.plans;
        }

        function updateItem(idx, key, val) {
            sectionToList()[idx][key] = val;
        }

        async function uploadMedia(file, idx) {
            if (!file) return;
            const btn = event.currentTarget.previousElementSibling;
            const originalText = btn.innerText;
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64Content = e.target.result.split(',')[1];
                    const fileName = `upload_${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                    const path = `assets/images/${fileName}`;

                    const res = await fetch(`https://api.github.com/repos/cartnovaco-netizen/INDIA-FITNESS/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload media: ${fileName}`,
                            content: base64Content,
                            branch: 'main'
                        })
                    });

                    if (res.ok) {
                        updateItem(idx, 'image', path);
                        render();
                        showToast("Image Uploaded Successfully!");
                    } else {
                        alert("Upload failed: " + res.statusText);
                    }
                };
                reader.readAsDataURL(file);
            } catch (err) {
                alert("Error during upload: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function addSubItem(idx, key, val) {
            if (!val) return;
            sectionToList()[idx][key].push(val);
            render();
        }

        function removeSubItem(idx, key, subIdx) {
            sectionToList()[idx][key].splice(subIdx, 1);
            render();
        }

        function addNewItem() {
            const list = sectionToList();
            if (currentSection === 'trainers') list.push({ name: 'New Trainer', role: 'Coach', exp: 'New', bio: '...', image: 'assets/images/default.jpg', specializations: [] });
            if (currentSection === 'gallery') list.push({ caption: 'New Image', image: 'assets/images/default.jpg' });
            if (currentSection === 'plans') list.push({ title: 'New Plan', type: 'Basic', price: '₹0', duration: '/ month', bonus: '', features: [], theme: 'tilt-card', button_text: 'Join Now' });
            render();
        }

        function removeItem(idx) {
            if(confirm('Delete this item?')) {
                sectionToList().splice(idx, 1);
                render();
            }
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = 'Uploading...';
            
            try {
                const headers = { 
                    'Authorization': `token ${token}`,
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                };
                
                const filename = currentSection === 'trainers' ? 'trainers.json' : currentSection === 'gallery' ? 'gallery.json' : 'plans.json';
                const wrapKey = currentSection === 'trainers' ? 'trainers' : currentSection === 'gallery' ? 'items' : 'plans';
                
                // 1. Get SHA
                const getRes = await fetch(`https://api.github.com/repos/cartnovaco-netizen/INDIA-FITNESS/contents/_data/${filename}`, { headers });
                const existingFile = await getRes.json();
                
                // 2. Prepare content
                const contentObj = {};
                contentObj[wrapKey] = sectionToList();
                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(contentObj, null, 2))));

                // 3. Update
                const updateRes = await fetch(`https://api.github.com/repos/cartnovaco-netizen/INDIA-FITNESS/contents/_data/${filename}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        message: `CMS Update: Updated ${currentSection}`,
                        content: newContent,
                        sha: existingFile.sha,
                        branch: 'main'
                    })
                });

                if (updateRes.ok) {
                    showToast();
                } else {
                    alert("GitHub Error: " + updateRes.statusText);
                }
            } catch (e) {
                alert("Save failed. Make sure you are logged in.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'Publish Changes';
            }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
